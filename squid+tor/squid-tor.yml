services:

  tor:
    image: dperson/torproxy
    container_name: tor
    restart: unless-stopped
    ports:
      - "9050:9050"

  privoxy:
    image: vimagick/privoxy
    container_name: privoxy
    restart: unless-stopped
    depends_on:
      - tor
    ports:
      - "8118:8118"
    volumes:
      - ./privoxy/config:/etc/privoxy/config

  squid:
    image: ubuntu/squid
    container_name: squid
    restart: unless-stopped
    depends_on:
      - privoxy
    ports:
      - "3128:3128"
    volumes:
      - ./squid.conf:/etc/squid/squid.conf
      - ./logs:/var/log/squid