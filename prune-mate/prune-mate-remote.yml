services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-socket-proxy
    restart: unless-stopped
    ports:
      - "2375:2375"  # expose API (restrict this!)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      VOLUMES: 1
      NETWORKS: 1
      SYSTEM: 1
      EXEC: 0
      AUTH: 0
      BUILD: 1
      POST: 1
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EVENTS: 1
      INFO: 1
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      TASKS: 0